version: '3.8'

services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - '${PORT:-18333}:3000'
    environment:
      - PORT=3000
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - PROJECT_ROOT=/workspace
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
    volumes:
      - workspace-data:/workspace
    security_opt:
      - seccomp=seccomp.json
      - no-new-privileges:true
    # [W12修复] 添加资源限制防止容器耗尽宿主机资源
    mem_limit: 512m
    cpus: '2.0'
    pids_limit: 256
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID
    restart: unless-stopped
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://localhost:18333/health').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3

  # Development mode override
  # ⚠️ WARNING: app-dev 仅用于本地开发，严禁暴露到公网
  # 默认密钥故意使用弱值，部署前必须修改
  app-dev:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: deps
    ports:
      - '${PORT:-18333}:3000'
    # ⚠️ 以下使用 .env 文件中的变量，严禁硬编码实际密钥！
    environment:
      - PORT=3000
      - JWT_SECRET=${JWT_SECRET:-dev-secret-change-me-min-32-chars!!}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:-dev-refresh-change-me-min-32-chars!!}
      - PROJECT_ROOT=/workspace
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-changeme}
    volumes:
      - ..:/app
      - workspace-data:/workspace
      - /app/node_modules
    command: ['pnpm', 'dev']

volumes:
  workspace-data:
