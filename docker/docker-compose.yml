version: '3.8'

services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - PORT=3000
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - PROJECT_ROOT=/workspace
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
    volumes:
      - workspace-data:/workspace
    security_opt:
      - seccomp=./seccomp.json
      - no-new-privileges:true
    # [W12修复] 添加资源限制防止容器耗尽宿主机资源
    mem_limit: 512m
    cpus: '2.0'
    pids_limit: 256
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/health').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3

  # Development mode override
  app-dev:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: deps
    ports:
      - "${PORT:-3000}:3000"
    # [W15修复] ⚠️ 以下凭证仅用于开发环境，严禁用于生产部署！
    environment:
      - PORT=3000
      - JWT_SECRET=dev-secret-min-32-characters-long-here
      - JWT_REFRESH_SECRET=dev-refresh-secret-min-32-characters-long
      - PROJECT_ROOT=/workspace
      - ADMIN_USERNAME=admin
      - ADMIN_PASSWORD=admin
    volumes:
      - ..:/app
      - workspace-data:/workspace
      - /app/node_modules
    command: ["pnpm", "dev"]

volumes:
  workspace-data:
