name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v2
        with:
          version: 8.15.4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Verify .env.example exists and is up-to-date
      - name: Check .env.example
        run: test -f .env.example && echo "✓ .env.example exists"

      # [W16修复] 安全审计步骤，检测已知漏洞
      - name: Security audit
        run: pnpm audit --audit-level moderate

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm build

      - name: Frontend lint
        run: pnpm --filter web lint

      - name: Frontend type check
        run: pnpm --filter web exec tsc --noEmit -p tsconfig.build.json

      - name: Test
        run: pnpm test

      - name: Test coverage check
        run: pnpm --filter server exec vitest run --coverage
        continue-on-error: true

      # Shared package type check
      - name: Shared package type check
        run: pnpm --filter shared exec tsc --noEmit

  # Build Docker image and verify it builds correctly
  docker-build-check:
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build Docker image (dry-run)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: false
          cache-from: type=gha
          tags: ai-cli-mobile:test

  build-and-push:
    needs: lint-and-test
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase repository name
        id: repo
        run: echo "lower=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.repo.outputs.lower }}:latest
            ghcr.io/${{ steps.repo.outputs.lower }}:${{ github.sha }}
            ${{ startsWith(github.ref, 'refs/tags/v') && format('ghcr.io/{0}:{1}', steps.repo.outputs.lower, github.ref_name) || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
